name: CI

# 설계 킷(validate.py 187)·백엔드 pytest·프론트 verify를 PR과 main push에서 자동 검증한다.
# (F10 — 이전엔 사람 손 실행에만 의존했다.)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  db-kit:
    name: DB 설계 킷 검증 (validate.py 187)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: oegobanjang
          POSTGRES_PASSWORD: oegobanjang
          POSTGRES_DB: oegobanjang
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U oegobanjang"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: validate.py (187 checks)
        env:
          DATABASE_URL: postgresql://oegobanjang:oegobanjang@localhost:5432/oegobanjang
        run: uv run --no-project --with "psycopg[binary]" python db/validate.py --reset

  backend:
    name: 백엔드 pytest (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: oegobanjang
          POSTGRES_PASSWORD: oegobanjang
          POSTGRES_DB: oegobanjang
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U oegobanjang"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: uv sync (Python 3.14 — uuid7)
        working-directory: backend
        run: uv sync --python 3.14
      - name: pytest
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://oegobanjang:oegobanjang@localhost:5432/oegobanjang
        run: uv run pytest

  frontend:
    name: 프론트 verify (typecheck·lint·test·build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run verify

  rag:
    name: RAG 파이프라인 (pytest + pgvector E2E, hit@3 게이트)
    runs-on: ubuntu-latest
    services:
      postgres:
        # 서비스 DB(postgres:16)와 달리 RAG 인덱스는 pgvector 확장이 필요하다
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: oegobanjang_rag
        ports:
          - 55433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: uv sync (Python 3.13 — langchain 스택은 3.14 미검증이라 backend와 분리 핀)
        working-directory: rag
        run: uv sync --python 3.13
      # pytest보다 먼저 색인한다 — 비자서류 검색(search_visa_policy_documents) 테스트가
      # workforce_official의 실 데이터(E9_STAY_EXT_STEP* 등)를 읽기 전용으로 검증하기 때문.
      - name: 수집·청킹 (오프라인 평가 게이트 포함)
        working-directory: rag
        run: uv run python -m oe_rag.cli ingest --eval-dataset evals/datasets/rag_retrieval_cases.jsonl
      - name: pgvector 색인 — workforce (deterministic)
        working-directory: rag
        run: uv run python -m oe_rag.cli index --embedding-provider deterministic --reset
      - name: pgvector 색인 — 다국어 컨택 (deterministic)
        working-directory: rag
        run: uv run python -m oe_rag.cli index-multilingual --embedding-provider deterministic --reset
      - name: pytest (단위 + pgvector 통합 — 다국어·비자서류 포함)
        working-directory: rag
        run: uv run pytest
      - name: 런타임 검색 품질 게이트 (Hit@1/3/5·MRR·safety/misuse=0)
        working-directory: rag
        run: uv run python -m oe_rag.cli eval
      - name: rag 서비스 기동 스모크 (GET /health, POST /retrieve — OPENAI_API_KEY 불필요)
        working-directory: rag
        run: |
          uv run uvicorn oe_rag.api:app --port 8100 &
          for i in $(seq 1 20); do curl -sf http://127.0.0.1:8100/health && break; sleep 0.5; done
          curl -sf http://127.0.0.1:8100/health | tee /dev/stderr | grep -q '"status":"ok"'
          curl -sf -X POST http://127.0.0.1:8100/retrieve \
            -H "Content-Type: application/json" \
            -d '{"query":"내국인 구인노력은 언제 확인해야 해?","case_type":"new_hiring"}' \
            | tee /dev/stderr | grep -q '"retrieved_count"'
          kill %1
